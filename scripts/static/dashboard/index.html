<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>国家电网数据同步控制台</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 72 72' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='bg' x1='0' y1='0' x2='72' y2='72' gradientUnits='userSpaceOnUse'%3E%3Cstop stop-color='%231e3a5f'/%3E%3Cstop offset='1' stop-color='%230f172a'/%3E%3C/linearGradient%3E%3ClinearGradient id='bl' x1='36' y1='12' x2='36' y2='60' gradientUnits='userSpaceOnUse'%3E%3Cstop stop-color='%23fbbf24'/%3E%3Cstop offset='1' stop-color='%23f59e0b'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect x='4' y='4' width='64' height='64' rx='16' fill='url(%23bg)' stroke='rgba(59,130,246,0.5)' stroke-width='1.5'/%3E%3Cpath d='M38 18 L28 38 H34 L32 54 L44 32 H38 Z' fill='url(%23bl)' stroke='%23fef3c7' stroke-width='0.5' stroke-linejoin='round'/%3E%3C/svg%3E" />
  <meta name="theme-color" content="#0f1419" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="国电网数据" />
  <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22%E5%9B%BD%E5%AE%B6%E7%94%B5%E7%BD%91%E6%95%B0%E6%8D%AE%E6%8E%A7%E5%88%B6%E5%8F%B0%22%2C%22short_name%22%3A%22%E7%94%B5%E8%B4%B9%E7%9B%91%E6%8E%A7%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230f1419%22%2C%22theme_color%22%3A%22%230f1419%22%2C%22start_url%22%3A%22.%2F%22%7D" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
  <style>
    :root {
      --bg: #0f1419; --card: #1a2332; --border: #2d3a4f; --text: #e7ecf3;
      --muted: #8b9cb3; --accent: #3b82f6; --accent2: #10b981; --warn: #f59e0b; --danger: #ef4444;
      --info: #60a5fa; --danger-bg: #450a0a; --success-bg: #064e3b; --warn-bg: #422006;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    *::selection { background: rgba(59, 130, 246, 0.35); color: #fff; }
    /* 自定义滚动条：暗色主题匹配 */
    *::-webkit-scrollbar { width: 8px; height: 8px; }
    *::-webkit-scrollbar-track { background: transparent; }
    *::-webkit-scrollbar-thumb { background: #2d3a4f; border-radius: 4px; }
    *::-webkit-scrollbar-thumb:hover { background: #3b82f6; }
    html { scrollbar-color: #2d3a4f transparent; scrollbar-width: thin; }
    body { font-family: "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; -webkit-tap-highlight-color: transparent; }
    header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; flex-wrap: wrap; align-items: center; gap: 1rem; background: linear-gradient(180deg, #152030 0%, var(--bg) 100%); position: sticky; top: 0; z-index: 20; backdrop-filter: blur(8px); }
    header h1 { font-size: 1.25rem; font-weight: 600; }
    header .meta { color: var(--muted); font-size: 0.85rem; }
    .brand { display: flex; align-items: center; gap: 0.7rem; min-width: 0; }
    .brand-logo { width: 36px; height: 36px; flex: 0 0 auto; filter: drop-shadow(0 4px 10px rgba(59, 130, 246, 0.3)); }
    .toolbar { margin-left: auto; display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
    button, select, input[type="password"], input[type="text"] {
      background: var(--card); border: 1px solid var(--border); color: var(--text);
      padding: 0.45rem 0.9rem; border-radius: 8px; cursor: pointer; font-size: 0.9rem;
      transition: filter 0.15s, transform 0.05s, opacity 0.2s, border-color 0.2s;
    }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    button.primary:disabled { opacity: 0.5; cursor: not-allowed; }
    button:hover:not(:disabled) { filter: brightness(1.08); }
    button:active:not(:disabled) { transform: scale(0.97); }
    button .spinner { display: inline-block; width: 0.85em; height: 0.85em; margin-right: 0.4rem; border: 2px solid currentColor; border-right-color: transparent; border-radius: 50%; vertical-align: -1px; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #refreshBtn.spinning { pointer-events: none; }
    #refreshBtn.spinning svg { animation: spin 0.8s linear infinite; }
    .btn-icon { display: inline-flex; align-items: center; gap: 0.4rem; }
    .btn-icon svg { width: 1em; height: 1em; flex: 0 0 auto; }
    main { padding: 1rem 1.5rem 2rem; display: grid; gap: 1rem; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 960px) { .grid-2 { grid-template-columns: 1fr; } main { padding: 0.75rem; gap: 0.75rem; } header { padding: 0.75rem 1rem; } header h1 { font-size: 1.05rem; } header .meta { font-size: 0.78rem; } }
    /* 移动端：≤720px 隐藏按钮文字只留图标，提升信息密度 */
    @media (max-width: 720px) {
      .toolbar { width: 100%; margin-left: 0; justify-content: space-between; }
      .btn-icon .btn-text { display: none; }
      .btn-icon { padding: 0.5rem 0.6rem; }
      .btn-icon svg { width: 1.15em; height: 1.15em; }
      .tab-btn .tab-text { display: none; }
      .tab-btn { padding: 0.45rem 0.6rem; }
      .tab-btn svg { width: 1.1em; height: 1.1em; display: block; }
      header { position: relative; padding: 0.65rem 0.85rem; gap: 0.5rem; }
      header > div:first-child { flex: 1; min-width: 0; }
      header h1 { font-size: 0.95rem; }
      .brand-logo { width: 30px; height: 30px; }
      .stat { padding: 0.65rem 0.75rem; }
      .stat .value { font-size: 1.1rem; }
      .stat .label { font-size: 0.7rem; }
      .chart-wrap { height: 220px; }
      .chart-wrap.tall { height: 260px; }
      main { padding: 0.5rem; gap: 0.5rem; }
      .card { padding: 0.75rem 0.85rem; border-radius: 10px; }
      .card h2 { font-size: 0.88rem; margin-bottom: 0.5rem; }
      .step-item { padding: 0.5rem 0.6rem; font-size: 0.78rem; }
      .step-item strong { font-size: 0.9rem; }
      .sync-table { font-size: 0.75rem; }
      .sync-table th, .sync-table td { padding: 0.35rem 0.3rem; }
      .log-box { height: 50vh; min-height: 240px; font-size: 0.72rem; }
      .env-editor { min-height: 280px; font-size: 0.75rem; }
      .toast { min-width: 200px; max-width: calc(100vw - 2rem); font-size: 0.82rem; }
      .toast-stack { top: 0.5rem; right: 0.5rem; left: 0.5rem; }
      select { max-width: 50vw; }
    }
    /* 超窄屏：≤400px 户号下拉折行 */
    @media (max-width: 400px) {
      .toolbar { flex-direction: column; align-items: stretch; gap: 0.4rem; }
      .tabs { justify-content: space-between; }
      select { max-width: 100%; }
    }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; transition: border-color 0.2s, box-shadow 0.2s; }
    .card:hover { border-color: rgba(59, 130, 246, 0.35); box-shadow: 0 4px 14px rgba(0, 0, 0, 0.2); }
    .card h2 { font-size: 0.95rem; color: var(--muted); margin-bottom: 0.75rem; font-weight: 500; display: flex; align-items: center; gap: 0.5rem; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.75rem; }
    .stat { background: #121a26; border-radius: 10px; padding: 0.85rem 0.95rem; position: relative; overflow: hidden; transition: transform 0.15s, border-color 0.2s; border: 1px solid transparent; }
    .stat:hover { transform: translateY(-2px); border-color: var(--border); }
    /* 色彩状态用左侧 3px 强调条突出，类似 APP 卡片 */
    .stat.good { border-left: 3px solid var(--accent2); padding-left: calc(0.95rem - 2px); }
    .stat.bad { border-left: 3px solid var(--danger); padding-left: calc(0.95rem - 2px); }
    .stat.warn { border-left: 3px solid var(--warn); padding-left: calc(0.95rem - 2px); }
    .stat .label { font-size: 0.75rem; color: var(--muted); display: flex; align-items: center; gap: 0.35rem; }
    .stat .label svg { width: 0.95em; height: 0.95em; opacity: 0.85; }
    .stat .value { font-size: 1.35rem; font-weight: 600; margin-top: 0.25rem; line-height: 1.2; }
    .stat .value small { font-size: 0.8rem; color: var(--muted); font-weight: 400; }
    .stat.good .value { color: var(--accent2); }
    .stat.bad .value { color: var(--danger); }
    .stat.warn .value { color: var(--warn); }
    .stat .delta { display: inline-block; font-size: 0.7rem; padding: 0.05rem 0.35rem; border-radius: 4px; margin-top: 0.25rem; vertical-align: middle; }
    .stat .delta.up { color: var(--danger); background: rgba(239, 68, 68, 0.12); }
    .stat .delta.down { color: var(--accent2); background: rgba(16, 185, 129, 0.12); }
    .log-box { background: #0a0e14; border-radius: 8px; padding: 0.75rem; height: calc(100vh - 220px); min-height: 360px; overflow: auto; font-family: Consolas, monospace; font-size: 0.78rem; white-space: pre-wrap; word-break: break-all; color: #b8c5d6; }
    .sync-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; margin-bottom: 1rem; }
    .sync-table th, .sync-table td { border-bottom: 1px solid var(--border); padding: 0.45rem 0.5rem; text-align: left; }
    .sync-table th { color: var(--muted); font-weight: 500; }
    .log-user-group { margin-bottom: 1.25rem; }
    .log-user-group h3 { font-size: 0.9rem; color: var(--text); margin-bottom: 0.5rem; font-weight: 600; }
    .log-user-group h3 span { color: var(--muted); font-weight: 400; font-size: 0.82rem; }
    .status-pill { display: inline-block; padding: 0.15rem 0.55rem; border-radius: 999px; font-size: 0.75rem; background: #243044; white-space: nowrap; }
    .status-pill.running { background: var(--warn-bg); color: var(--warn); }
    .status-pill.running::before { content: ""; display: inline-block; width: 6px; height: 6px; background: var(--warn); border-radius: 50%; margin-right: 0.3rem; vertical-align: 1px; animation: pulse 1.2s ease-in-out infinite; }
    .status-pill.success { background: var(--success-bg); color: var(--accent2); }
    .status-pill.failed { background: var(--danger-bg); color: var(--danger); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .chart-wrap { position: relative; height: 260px; }
    .chart-wrap.tall { height: 300px; }
    .grid-2 .span-full { grid-column: 1 / -1; }
    .tabs { display: flex; gap: 0.5rem; }
    .tab-btn { background: transparent; border: 1px solid var(--border); display: inline-flex; align-items: center; gap: 0.35rem; }
    .tab-btn svg { width: 1em; height: 1em; flex: 0 0 auto; }
    .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .panel { display: none; }
    .panel.active { display: grid; gap: 1rem; animation: fadeIn 0.25s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .env-editor { width: 100%; min-height: 420px; background: #0a0e14; color: #b8c5d6; border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem; font-family: Consolas, monospace; font-size: 0.82rem; line-height: 1.45; resize: vertical; }
    .env-meta, .hint { color: var(--muted); font-size: 0.82rem; }
    .hint { margin-top: 0.5rem; }
    .env-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.75rem; }
    .step-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 0.75rem; }
    .step-item { background: #121a26; border-radius: 8px; padding: 0.65rem 0.75rem; font-size: 0.85rem; }
    .step-item .title { color: var(--muted); font-size: 0.75rem; margin-bottom: 0.25rem; display: flex; align-items: center; gap: 0.4rem; }
    .step-item strong { font-weight: 700; color: var(--text); font-size: 1rem; }
    .step-bar { height: 6px; background: #0a0e14; border-radius: 3px; margin-top: 0.5rem; overflow: hidden; }
    .step-bar > div { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent2) 0%, var(--accent) 60%, var(--warn) 85%, var(--danger) 100%); transition: width 0.5s ease; }
    .step-bar.split > div:nth-child(1) { background: var(--accent2); }
    .step-bar.split > div:nth-child(2) { background: var(--accent); }
    .step-bar.split > div:nth-child(3) { background: var(--warn); }
    .step-badge { display: inline-block; padding: 0.1rem 0.45rem; border-radius: 6px; background: #1e3a5f; color: #93c5fd; font-size: 0.75rem; margin-left: 0.35rem; }
    .banner { padding: 0.75rem 1rem; border-radius: 10px; border: 1px solid #7c2d12; background: #431407; color: #fdba74; font-size: 0.9rem; display: flex; align-items: center; gap: 0.6rem; }
    .banner svg { flex: 0 0 auto; width: 1.1em; height: 1.1em; }
    .banner.info { border-color: #1e3a5f; background: #172554; color: #93c5fd; }

    /* Toast 通知 */
    .toast-stack { position: fixed; top: 1rem; right: 1rem; z-index: 200; display: flex; flex-direction: column; gap: 0.5rem; pointer-events: none; max-width: calc(100vw - 2rem); }
    .toast { background: var(--card); border: 1px solid var(--border); border-left: 3px solid var(--accent); padding: 0.7rem 1rem; border-radius: 8px; box-shadow: 0 8px 20px rgba(0,0,0,0.45); font-size: 0.88rem; color: var(--text); display: flex; align-items: flex-start; gap: 0.55rem; min-width: 240px; max-width: 380px; pointer-events: auto; animation: toastIn 0.25s ease; }
    .toast.success { border-left-color: var(--accent2); }
    .toast.error { border-left-color: var(--danger); }
    .toast.warn { border-left-color: var(--warn); }
    .toast.info { border-left-color: var(--info); }
    .toast svg { width: 1.05em; height: 1.05em; flex: 0 0 auto; margin-top: 1px; }
    .toast.success svg { color: var(--accent2); }
    .toast.error svg { color: var(--danger); }
    .toast.warn svg { color: var(--warn); }
    .toast.info svg { color: var(--info); }
    .toast .toast-msg { flex: 1; }
    .toast .toast-x { cursor: pointer; color: var(--muted); padding: 0 0.2rem; }
    .toast.leaving { animation: toastOut 0.25s ease forwards; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes toastOut { to { opacity: 0; transform: translateX(20px); } }

    /* 自定义确认对话框 */
    .modal-overlay { position: fixed; inset: 0; z-index: 150; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.55); backdrop-filter: blur(4px); animation: fadeIn 0.15s ease; }
    .modal-box { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.25rem 1rem; width: min(380px, 92vw); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    .modal-box .modal-msg { color: var(--text); font-size: 0.95rem; margin-bottom: 1rem; line-height: 1.5; }
    .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }

    /* 骨架屏 */
    .skeleton { background: linear-gradient(90deg, #1a2332 0%, #2d3a4f 50%, #1a2332 100%); background-size: 200% 100%; animation: shimmer 1.3s linear infinite; border-radius: 8px; }
    @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }
    .skeleton-line { height: 12px; margin-bottom: 8px; }
    .skeleton-line.short { width: 60%; }
    .skel-stat { background: #121a26; border-radius: 10px; padding: 0.85rem 0.95rem; }
    .skel-stat .skeleton { height: 12px; margin-bottom: 8px; }
    .skel-stat .skeleton.big { height: 22px; width: 70%; margin: 6px 0 0; }

    .error-retry { color: var(--danger); font-size: 0.85rem; padding: 1rem; text-align: center; }
    .error-retry button { margin-left: 0.5rem; padding: 0.25rem 0.75rem; }

    .login-overlay {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(59, 130, 246, 0.18) 0%, transparent 55%),
                  radial-gradient(ellipse 60% 50% at 80% 100%, rgba(16, 185, 129, 0.12) 0%, transparent 50%),
                  linear-gradient(165deg, #0a0e14 0%, #0f1419 40%, #121a26 100%);
    }
    .login-overlay::before {
      content: ""; position: absolute; inset: 0; opacity: 0.35;
      background-image: linear-gradient(rgba(45, 58, 79, 0.4) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(45, 58, 79, 0.4) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 20%, transparent 75%);
    }
    .login-box {
      position: relative; width: min(400px, 92vw);
      background: linear-gradient(145deg, rgba(26, 35, 50, 0.95) 0%, rgba(18, 26, 38, 0.98) 100%);
      border: 1px solid rgba(59, 130, 246, 0.25);
      border-radius: 20px; padding: 2rem 2rem 1.75rem;
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(255, 255, 255, 0.04) inset;
    }
    .login-brand { text-align: center; margin-bottom: 1.75rem; }
    .login-logo {
      width: 72px; height: 72px; margin: 0 auto 1rem;
      filter: drop-shadow(0 8px 16px rgba(59, 130, 246, 0.35));
    }
    .login-brand h2 {
      font-size: 1.35rem; font-weight: 600; letter-spacing: 0.02em;
      background: linear-gradient(135deg, #e7ecf3 0%, #93c5fd 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .login-brand .sub { color: var(--muted); font-size: 0.8rem; margin-top: 0.35rem; }
    .login-field { margin-bottom: 1rem; }
    .login-field label { display: block; font-size: 0.78rem; color: var(--muted); margin-bottom: 0.4rem; }
    .login-field input {
      width: 100%; padding: 0.65rem 0.85rem; border-radius: 10px;
      background: #0a0e14; border: 1px solid var(--border);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .login-field input:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }
    .login-box .err { color: var(--danger); font-size: 0.82rem; min-height: 1.25rem; margin-bottom: 0.5rem; text-align: center; }
    .login-box .login-submit {
      width: 100%; padding: 0.65rem; border-radius: 10px; border: none; cursor: pointer;
      font-size: 0.95rem; font-weight: 600; color: #fff;
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 50%, #1d4ed8 100%);
      box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .login-box .login-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5); }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="loginOverlay" class="login-overlay hidden">
    <div class="login-box">
      <div class="login-brand">
        <svg class="login-logo" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <linearGradient id="logoBg" x1="0" y1="0" x2="72" y2="72" gradientUnits="userSpaceOnUse">
              <stop stop-color="#1e3a5f"/><stop offset="1" stop-color="#0f172a"/>
            </linearGradient>
            <linearGradient id="logoBolt" x1="36" y1="12" x2="36" y2="60" gradientUnits="userSpaceOnUse">
              <stop stop-color="#fbbf24"/><stop offset="1" stop-color="#f59e0b"/>
            </linearGradient>
          </defs>
          <rect x="4" y="4" width="64" height="64" rx="16" fill="url(#logoBg)" stroke="rgba(59,130,246,0.5)" stroke-width="1.5"/>
          <circle cx="36" cy="36" r="22" stroke="rgba(59,130,246,0.35)" stroke-width="1.5" fill="none"/>
          <path d="M38 18 L28 38 H34 L32 54 L44 32 H38 Z" fill="url(#logoBolt)" stroke="#fef3c7" stroke-width="0.5" stroke-linejoin="round"/>
          <path d="M18 52 Q36 58 54 52" stroke="#10b981" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.7"/>
        </svg>
        <h2>国家电网数据控制台</h2>
        <p class="sub">用电监控 · 数据同步</p>
      </div>
      <div class="err" id="loginError"></div>
      <div class="login-field">
        <label for="loginPassword">密码</label>
        <input id="loginPassword" type="password" placeholder="请输入密码" autocomplete="current-password" />
      </div>
      <button id="loginBtn" type="button" class="login-submit">登 录</button>
    </div>
  </div>

  <header>
    <div class="brand">
      <svg class="brand-logo" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>

      <button id="fetchBtn" class="primary btn-icon" title="立即同步 (S)" aria-label="立即同步"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 11-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg><span class="btn-text">立即同步</span></button>

  <main>
    <div id="dbBanner" class="banner hidden"></div>

    <div id="panelMonitor" class="panel active">
      <div class="card" id="monitorCard">
        <h2>户号概览 · <span id="userTitle">—</span></h2>
        <div class="stats" id="statsGrid"></div>
      </div>
      <div class="grid-2" id="rowStepMonthly">
        <div id="stepCard" class="card hidden">
          <h2>阶梯用电 · <span id="stepMonth">—</span><span id="stepStage" class="step-badge"></span></h2>
          <div class="step-grid" id="stepGrid"></div>
        </div>
        <div id="monthlyCard" class="card">
          <h2>月用电量（近 12 个月）</h2>
          <div class="chart-wrap"><canvas id="monthlyChart"></canvas></div>
        </div>
      </div>
      <div id="dailyComboCard" class="card">
        <h2>日用电量与谷/峰分时（近 30 天）</h2>

    <div id="panelLogs" class="panel">
      <div class="card">
        <h2>数据库运行记录 · <span id="logHint" style="font-weight:400">balance_log</span></h2>
        <div id="syncLogWrap"></div>
        <h2 style="margin-top:1rem;display:flex;align-items:center;gap:0.5rem">应用日志（app.log）
          <span style="flex:1"></span>
          <button id="clearLogBtn" style="font-size:0.85rem;padding:0.3rem 0.7rem">清空日志</button>
          <button id="mqttRepublishBtn" style="font-size:0.85rem;padding:0.3rem 0.7rem">立即推送 MQTT</button>

    <div id="panelEnv" class="panel">
      <div class="card">

        <div class="env-actions">
          <button id="envReloadBtn">重新加载配置</button>
          <button id="envSaveBtn" class="primary">保存并应用</button>
        </div>
        <p class="hint">保存后自动热重载。修改 JOB_START_TIME / WEB_DASHBOARD_PORT / WEB_DASHBOARD_PASSWORD 需重启容器。</p>
      </div>

  <div class="toast-stack" id="toastStack" aria-live="polite"></div>

  <script>
    Chart.register(ChartDataLabels);
    const $ = (id) => document.getElementById(id);
    let dailyComboChart, monthlyChart;
    let sessionToken = sessionStorage.getItem("dashboard_session") || "";
    let loginRequired = false;
    let dbEnabled = true;
    let activeTab = "monitor";
    let logTimer = null;
    let statusTimer = null;
    let cooldownTimer = null;
    let lastSummary = null;
    let lastDailyData = [];
    let lastMonthlyData = [];
    const ICONS = {
      balance: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>',
      usage: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>',
      bill: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg>',
      year: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
      tou: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
      due: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>',
      info: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>',
      ok: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
      warn: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
      err: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
    };

    /* Toast 通知系统：右上角浮层提示，自动消失，替代原生 alert */
    function toast(msg, type = "info", ms = 3200) {
      const stack = $("toastStack");
      const el = document.createElement("div");
      el.className = `toast ${type}`;
      const iconName = type === "success" ? "ok" : type === "error" ? "err" : type === "warn" ? "warn" : "info";
      el.innerHTML = `${ICONS[iconName] || ICONS.info}<div class="toast-msg"></div><span class="toast-x">×</span>`;
      el.querySelector(".toast-msg").textContent = msg;
      stack.appendChild(el);
      const close = () => { el.classList.add("leaving"); setTimeout(() => el.remove(), 250); };
      el.querySelector(".toast-x").onclick = close;
      setTimeout(close, ms);
    }

    /* 自定义确认对话框，替代原生 confirm，返回 Promise<boolean> */
    function confirmBox(msg, { okText = "确定", cancelText = "取消", danger = false } = {}) {
      return new Promise(resolve => {
        const overlay = document.createElement("div");
        overlay.className = "modal-overlay";
        overlay.innerHTML = `<div class="modal-box"><div class="modal-msg"></div><div class="modal-actions"><button class="modal-cancel">${cancelText}</button><button class="primary modal-ok">${okText}</button></div></div>`;
        overlay.querySelector(".modal-msg").textContent = msg;
        if (danger) overlay.querySelector(".modal-ok").style.background = "var(--danger)";
        document.body.appendChild(overlay);
        const done = (v) => { overlay.remove(); resolve(v); };
        overlay.querySelector(".modal-cancel").onclick = () => done(false);
        overlay.querySelector(".modal-ok").onclick = () => done(true);
        overlay.onclick = (e) => { if (e.target === overlay) done(false); };
        document.addEventListener("keydown", function esc(ev) { if (ev.key === "Escape") { done(false); document.removeEventListener("keydown", esc); } });
      });
    }

    function escapeHtml(s) { return String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }

    /* 相对时间：把 yyyy-mm-dd hh:mm:ss 转成 "X 小时前" 等 */
    function relTime(s) {
      if (!s) return "";
      const t = new Date(s.replace(" ", "T"));
      if (isNaN(t)) return s;
      const diff = (Date.now() - t.getTime()) / 1000;
      if (diff < 60) return "刚刚";
      if (diff < 3600) return Math.floor(diff / 60) + " 分钟前";
      if (diff < 86400) return Math.floor(diff / 3600) + " 小时前";
      if (diff < 2592000) return Math.floor(diff / 86400) + " 天前";
      return s.slice(0, 10);
    }

    const labelFmt = (v) => {
      if (v === null || v === undefined || v === "") return "";
      const n = Number(v);
      if (!Number.isFinite(n) || n === 0) return "";
      return n >= 100 ? n.toFixed(0) : n.toFixed(1);
    };
    const barLabelFmt = (v) => {
      if (v === null || v === undefined || v === "") return "";
      const n = Number(v);
      if (!Number.isFinite(n) || n === 0) return "";
      return n >= 10 ? n.toFixed(0) : n.toFixed(1);
    };

    function headers() {
      const h = { "Content-Type": "application/json" };
      if (sessionToken) h["X-Dashboard-Session"] = sessionToken;
      return h;
    }

    async function api(path, opts = {}) {
      const res = await fetch("./" + path.replace(/^\//, ""), { ...opts, headers: { ...headers(), ...(opts.headers || {}) } });
      if (res.status === 401) {
        sessionStorage.removeItem("dashboard_session");
        sessionToken = "";
        showLogin(true);
        throw new Error("请先登录");
      }
      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: res.statusText }));
        throw new Error(err.detail || res.statusText);
      }
      return res.json();
    }

    function showLogin(show) {
      $("loginOverlay").classList.toggle("hidden", !show);
      $("logoutBtn").classList.toggle("hidden", show || !loginRequired);
    }

    async function doLogin() {
      $("loginError").textContent = "";
      const btn = $("loginBtn");
      const origText = btn.textContent;
      btn.disabled = true;
      btn.innerHTML = `<span class="spinner" style="border-color:#fff;border-right-color:transparent"></span>登录中...`;
      try {
        const r = await fetch("./api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: $("loginPassword").value }),
        });
        if (!r.ok) {
          const err = await r.json().catch(() => ({}));
          $("loginError").textContent = err.detail || "登录失败";
          return;
        }
        const data = await r.json();
        sessionToken = data.token || "ok";
        sessionStorage.setItem("dashboard_session", sessionToken);
        showLogin(false);
        await bootstrap();
      } catch (e) {
        $("loginError").textContent = e.message;
      } finally {
        btn.disabled = false;
        btn.textContent = origText;
      }
    }

    function fmtNum(v, unit = "") {
      if (v === null || v === undefined || v === "") return "—";
      return Number(v).toLocaleString("zh-CN", { maximumFractionDigits: 2 }) + (unit ? " " + unit : "");
    }
    function fmtBold(v, unit = "") {
      if (v === null || v === undefined || v === "") return "—";
      const n = Number(v).toLocaleString("zh-CN", { maximumFractionDigits: 2 });
      return `<strong>${n}</strong>${unit ? " " + unit : ""}`;
    }

    function updateDbBanner(st) {
      dbEnabled = st.db_enabled !== false;
      const banner = $("dbBanner");
      const setBanner = (text) => { banner.className = "banner"; banner.innerHTML = `${ICONS.warn}${escapeHtml(text)}`; banner.classList.remove("hidden"); };
      if (!dbEnabled) {
        setBanner("数据库连接失败，请检查连接参数与数据库服务。");
        $("rowStepMonthly").classList.add("hidden");
        $("dailyComboCard").classList.add("hidden");
        $("monitorCard").classList.add("hidden");
        return;
      }
      if (!st.db_available) {
        setBanner("数据库已配置但无法连接，请检查连接参数与数据库服务。");
      } else {
        banner.classList.add("hidden");
      }
      $("rowStepMonthly").classList.remove("hidden");
      $("dailyComboCard").classList.remove("hidden");
      $("monitorCard").classList.remove("hidden");
    }

    function renderStepCard(s) {
      const card = $("stepCard");
      const monthlyCard = $("monthlyCard");
      const st = s.step_data;
      if (!s.is_residential || !st) {
        card.classList.add("hidden");
        monthlyCard.classList.add("span-full");
        return;
      }
      card.classList.remove("hidden");
      monthlyCard.classList.remove("span-full");
      $("stepMonth").textContent = st.year_month || "—";
      const stageNames = ["", "第一阶梯", "第二阶梯", "第三阶梯"];
      $("stepStage").textContent = stageNames[st.step_stage] || `第 ${st.step_stage} 阶梯`;
      /* 阶梯进度条：用累计已用 + 三段容量估算占比，直观显示当前所处阶梯 */
      const total = Number(st.total_usage) || 0;
      const u1 = Number(st.used_step1) || 0;
      const u2 = Number(st.used_step2) || 0;
      const u3 = Number(st.used_step3) || 0;
      const c1 = u1 + (Number(st.remain_step1) || 0);
      const c2 = c1 + u2 + (Number(st.remain_step2) || 0);
      const c3 = c2 + u3;
      const denom = Math.max(c3, total, 1);
      const pct = (x) => Math.max(0, Math.min(100, (x / denom) * 100));
      let splitBars = "";
      if (c1 > 0 && c2 > c1) {
        /* 三段堆叠：一阶容量 / 二阶容量 / 三阶已用 */
        splitBars = `<div class="step-bar split">
          <div style="width:${pct(c1)}%"></div>
          <div style="width:${pct(c2 - c1)}%"></div>
          <div style="width:${pct(u3)}%"></div>
        </div>`;
      } else {
        splitBars = `<div class="step-bar"><div style="width:${pct(total)}%"></div></div>`;
      }
      const rows = [
        ["第一阶梯", fmtBold(st.used_step1, "kWh"), fmtBold(st.remain_step1, "kWh"), "剩余"],
        ["第二阶梯", fmtBold(st.used_step2, "kWh"), fmtBold(st.remain_step2, "kWh"), "剩余"],
        ["第三阶梯", fmtBold(st.used_step3, "kWh"), null, null],
        ["累计用电", fmtBold(st.total_usage, "kWh"), null, null],
      ];
      $("stepGrid").innerHTML = rows.map(([title, a, b, label]) =>
        `<div class="step-item"><div class="title">${title}</div><div>已用 ${a}${b ? `<br><span style="color:var(--muted)">${label} ${b}</span>` : ""}</div></div>`
      ).join("") + `<div class="step-item" style="grid-column:1/-1"><div class="title">阶梯进度</div>${splitBars}</div>`;
    }

    /* 计算环比变化：current 与 previous 的百分比差，返回 {text, cls} 或 null */
    function deltaPct(cur, prev, invertColor = false) {
      if (cur == null || prev == null || Number(prev) === 0) return null;
      const c = Number(cur), p = Number(prev);
      if (!Number.isFinite(c) || !Number.isFinite(p)) return null;
      const pct = ((c - p) / p) * 100;
      if (!Number.isFinite(pct) || Math.abs(pct) < 0.5) return null;
      const up = pct > 0;
      /* invertColor：用电增加是 bad（红），余额增加是 good（绿） */
      const goodUp = invertColor ? !up : up;
      return { text: `${up ? "↑" : "↓"} ${Math.abs(pct).toFixed(1)}%`, cls: goodUp ? "up" : "down" };
    }

    function renderStats(s) {
      lastSummary = s;
      const tou = s.month_tou_summary || {};
      const touText = tou.valley != null ? `谷 ${fmtNum(tou.valley)} / 峰 ${fmtNum(tou.peak)} kWh` : "—";
      const billLabel = s.bill_month ? `(${s.bill_month})` : "";
      const billCharge = s.month_charge != null ? fmtNum(s.month_charge, "元") : "电费待出账";
      const yearlyLabel = s.yearly_label ? `${s.yearly_label} 年度` : "年度";
      const balanceLabel = s.balance_as_of ? `余额 (${s.balance_as_of.slice(0, 10)})` : "余额";
      const usageLabel = s.last_daily_date ? `最近用电 (${s.last_daily_date})` : "最近用电";
      const touLabel = tou.month ? `当月分时 (${tou.month})` : "当月分时";
      const balNum = Number(s.balance);
      /* 余额色彩：<0 红，<30 橙，否则绿（健康） */
      const balCls = s.balance == null ? "" : (balNum < 0 ? "bad" : balNum < 30 ? "warn" : "good");
      /* 应交金额：0 显示绿色"已交清"，>0 红色警示 */
      const dueZero = s.amount_due != null && Number(s.amount_due) === 0;
      const dueCls = s.amount_due == null ? "" : (dueZero ? "good" : "bad");
      const dueVal = dueZero ? '<strong>已交清</strong>' : fmtNum(s.amount_due, "元");

      /* 环比/同比：基于已加载的月度/日度图表数据 */
      let usageDelta = null, billUsageDelta = null;
      if (lastDailyData.length >= 2) {
        usageDelta = deltaPct(lastDailyData[lastDailyData.length - 1].total_usage, lastDailyData[lastDailyData.length - 2].total_usage);
      }
      if (lastMonthlyData.length >= 2) {
        billUsageDelta = deltaPct(lastMonthlyData[lastMonthlyData.length - 1].total_usage, lastMonthlyData[lastMonthlyData.length - 2].total_usage);
      }
      const deltaHtml = (d) => d ? `<div class="delta ${d.cls}">${d.text} 环比</div>` : "";
      const items = [
        { label: balanceLabel, icon: ICONS.balance, value: fmtNum(s.balance, "元"), cls: balCls, sub: "" },
        { label: usageLabel, icon: ICONS.usage, value: fmtNum(s.last_daily_usage, "kWh"), cls: "", sub: deltaHtml(usageDelta) },
        { label: `上月账单${billLabel}`, icon: ICONS.bill, value: `${fmtNum(s.month_usage, "kWh")} / ${billCharge}`, cls: "", sub: deltaHtml(billUsageDelta) },
        { label: yearlyLabel, icon: ICONS.year, value: `${fmtNum(s.yearly_usage, "kWh")} / ${fmtNum(s.yearly_charge, "元")}`, cls: "", sub: "" },
        { label: touLabel, icon: ICONS.tou, value: touText, cls: "", sub: "" },
        { label: "应交金额", icon: ICONS.due, value: dueVal, cls: dueCls, sub: "" },
      ];
      $("statsGrid").innerHTML = items.map(it =>
        `<div class="stat ${it.cls}"><div class="label">${it.icon || ""}<span>${it.label}</span></div><div class="value">${it.value}${it.sub ? `<br>${it.sub}` : ""}</div></div>`
      ).join("");
      $("userTitle").textContent = `${s.user_name || s.user_id} (${s.user_id})`;
      renderStepCard(s);
    }

    function upsertChart(ref, canvas, config) { if (ref) ref.destroy(); return new Chart(canvas, config); }

    /* 统一的 tooltip 样式：暗色卡片 + 标题 */
    const chartTooltip = {
      backgroundColor: "rgba(15, 20, 25, 0.95)", titleColor: "#e7ecf3", bodyColor: "#b8c5d6",
      borderColor: "#2d3a4f", borderWidth: 1, padding: 10, cornerRadius: 8, boxPadding: 4,
      titleFont: { size: 12, weight: "600" }, bodyFont: { size: 12 },
    };

    /* datalabel 智能隐藏：窄屏或数据点很多时只显示极值 */
    function smartDatalabel(type, total) {
      const narrow = window.innerWidth < 640;
      const hideAll = narrow && total > 8;
      const hideSome = total > 15;
      return {
        display: (ctx) => {
          const v = ctx.dataset.data[ctx.dataIndex];
          if (v == null || Number(v) === 0) return false;
          if (ctx.dataset.type === "line") return true;
          if (hideAll) {
            const arr = ctx.dataset.data.filter(x => Number(x) > 0);
            const mx = Math.max(...arr);
            return Number(v) === mx;
          }
          if (hideSome) {
            const arr = ctx.dataset.data.filter(x => Number(x) > 0);
            const sorted = [...arr].sort((a, b) => b - a);
            return sorted.indexOf(Number(v)) < 5;
          }
          return true;
        },
        formatter: (v, ctx) => ctx.dataset.type === "line" ? labelFmt(v) : barLabelFmt(v),
        color: (ctx) => ctx.dataset.type === "line" ? "#e7ecf3" : "#fff",
        font: (ctx) => ({ size: ctx.dataset.type === "line" ? 9 : 8, weight: "600" }),
        anchor: (ctx) => ctx.dataset.type === "line" ? "end" : "center",
        align: (ctx) => ctx.dataset.type === "line" ? "top" : "center",
        offset: (ctx) => ctx.dataset.type === "line" ? 2 : 0,
      };
    }

    function renderDailyComboChart(data) {
      dailyComboChart = upsertChart(dailyComboChart, $("dailyComboChart"), {
        type: "bar",
        data: {
          labels: data.map(d => d.date),
          datasets: [
            { type: "bar", label: "谷 kWh", data: data.map(d => d.valley_usage || 0), backgroundColor: "#10b981", stack: "tou", order: 2 },
            { type: "bar", label: "峰 kWh", data: data.map(d => d.peak_usage || 0), backgroundColor: "#f59e0b", stack: "tou", order: 2 },
            { type: "line", label: "总用电 kWh", data: data.map(d => d.total_usage), borderColor: "#3b82f6", backgroundColor: "rgba(59,130,246,0.12)", tension: 0.3, fill: false, order: 1, pointRadius: 3 },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: "index", intersect: false },
          plugins: {
            legend: { labels: { color: "#8b9cb3" } },
            tooltip: chartTooltip,
            datalabels: smartDatalabel("daily", data.length),
          },
          scales: {
            x: { stacked: true, ticks: { color: "#8b9cb3", maxRotation: 45, autoSkip: true, maxTicksLimit: 15 } },
            y: { stacked: true, ticks: { color: "#8b9cb3" }, grace: "10%" },
          },
        },
      });
    }

    function renderMonthlyChart(data) {
      monthlyChart = upsertChart(monthlyChart, $("monthlyChart"), {
        type: "bar",
        data: { labels: data.map(d => d.month), datasets: [
          { type: "bar", label: "用电量 kWh", data: data.map(d => d.total_usage), backgroundColor: "rgba(59,130,246,0.55)", borderColor: "rgba(59,130,246,0.8)", borderWidth: 1, borderRadius: 6, barPercentage: 0.5, categoryPercentage: 0.7, order: 2 },
          { type: "line", label: "电费 元", data: data.map(d => d.total_charge), borderColor: "#10b981", backgroundColor: "rgba(16,185,129,0.10)", tension: 0.35, fill: true, order: 1, pointRadius: 4, pointBackgroundColor: "#10b981", pointBorderColor: "#0f1419", pointBorderWidth: 2, yAxisID: "y1" },
        ]},
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: "index", intersect: false },
          plugins: {
            legend: { labels: { color: "#8b9cb3" } },
            tooltip: chartTooltip,
            datalabels: smartDatalabel("monthly", data.length),
          },
          scales: {
            x: { ticks: { color: "#8b9cb3" }, grid: { color: "rgba(45,58,79,0.3)" } },
            y: { position: "left", title: { display: true, text: "用电量 kWh", color: "#8b9cb3" }, ticks: { color: "#8b9cb3" }, grid: { color: "rgba(45,58,79,0.3)" }, grace: "12%" },
            y1: { position: "right", title: { display: true, text: "电费 元", color: "#8b9cb3" }, ticks: { color: "#8b9cb3" }, grid: { drawOnChartArea: false }, grace: "12%" },
          },
        },
      });
    }


    /* 骨架屏：在数据加载时显示占位，避免空白闪烁 */
    function showSkeleton() {
      $("statsGrid").innerHTML = Array.from({ length: 6 }).map(() =>
        `<div class="skel-stat"><div class="skeleton"></div><div class="skeleton big"></div></div>`
      ).join("");
      $("userTitle").textContent = "加载中...";
      $("stepGrid").innerHTML = '<div class="skeleton" style="height:60px"></div>';
    }

    /* 错误重试：在目标元素内显示错误信息 + 重试按钮 */
    function showError(target, msg, retryFn) {
      target.innerHTML = `<div class="error-retry">${escapeHtml(msg)} <button class="retry-btn">重试</button></div>`;
      target.querySelector(".retry-btn").onclick = retryFn;
    }

    async function loadUser(userId) {
      if (!userId || !dbEnabled) return;
      showSkeleton();
      const wrap = $("monitorCard");
      try {
        const [summary, daily, monthly] = await Promise.all([
          api(`/api/users/${userId}`),
          api(`/api/users/${userId}/charts/daily?days=30`),
          api(`/api/users/${userId}/charts/monthly?months=12`),
        ]);
        lastDailyData = daily.data || [];
        lastMonthlyData = monthly.data || [];
        renderStats(summary);
        renderDailyComboChart(lastDailyData);
        renderMonthlyChart(lastMonthlyData);
      } catch (e) {
        showError(wrap, "加载失败：" + e.message, () => loadUser(userId));
        toast(e.message, "error");
      }
    }

    async function loadUsers() {
      const data = await api("/api/users");
      const sel = $("userSelect");
      const cur = sel.value;
      sel.innerHTML = '<option value="">选择户号...</option>' + (data.users || []).map(u =>
        `<option value="${u.user_id}">${u.user_name || u.user_id} (${u.user_id})</option>`).join("");
      if (cur && data.users.some(u => u.user_id === cur)) sel.value = cur;
      else if (data.users.length) { sel.value = data.users[0].user_id; await loadUser(data.users[0].user_id); }
    }

    /* 同步中：让"立即同步"按钮显示 spinner；保留 .btn-text 节点以便复用 */
    function setFetchLoading(loading) {
      const btn = $("fetchBtn");
      const txt = btn.querySelector(".btn-text");
      const oldSpin = btn.querySelector(".spinner");
      if (loading) {
        btn.disabled = true;
        if (!oldSpin) {
          const sp = document.createElement("span");
          sp.className = "spinner";
          btn.insertBefore(sp, btn.firstChild);
        }
        if (txt) txt.textContent = "同步中...";
      } else {
        if (oldSpin) oldSpin.remove();
        if (txt) txt.textContent = "立即同步";
      }
    }

    /* 冷却倒计时：按钮禁用并显示剩余分钟秒 */
    function startCooldown(sec) {
      if (cooldownTimer) clearInterval(cooldownTimer);
      const btn = $("fetchBtn");
      const txt = btn.querySelector(".btn-text");
      btn.disabled = true;
      const tick = () => {
        if (sec <= 0) {
          clearInterval(cooldownTimer);
          cooldownTimer = null;
          if (txt) txt.textContent = "立即同步";
          btn.disabled = !dbEnabled;
          return;
        }
        const m = Math.floor(sec / 60), s = sec % 60;
        if (txt) txt.textContent = `冷却 ${m}:${String(s).padStart(2, "0")}`;
        sec--;
      };
      tick();
      cooldownTimer = setInterval(tick, 1000);
    }

    async function loadStatus() {
      try {
        const st = await api("/api/status");
        updateDbBanner(st);
        const f = st.fetch || {};
        const running = f.status === "running";
        const pillClass = running ? "running" : (f.status === "failed" ? "failed" : (f.message ? "success" : ""));
        const syncRel = st.last_sync_at ? relTime(st.last_sync_at) : "尚未同步";
        const srcText = st.last_sync_source ? ` (${st.last_sync_source === "manual" ? "手动" : "定时"})` : "";
        const statusLabel = running ? "同步中" : (f.status || "idle");
        $("statusLine").innerHTML = `上次同步 ${syncRel}${srcText} · DB ${st.db_type} · <span class="status-pill ${pillClass}">${statusLabel}</span> ${escapeHtml(f.message || "")}`;
        setFetchLoading(running);
        if (running) { $("fetchBtn").disabled = true; return; }
        if (!st.can_fetch && !running) {
          const remain = f.cooldown_remaining_sec;
          if (typeof remain === "number" && remain > 0) startCooldown(remain);
          else $("fetchBtn").disabled = true;
        } else if (!cooldownTimer) {
          $("fetchBtn").disabled = !dbEnabled;
        }
      } catch (e) {
        /* 静默失败，避免状态栏闪烁 */
      }
    }

    function renderBalanceLogs(groups) {
      if (!groups.length) {
        $("syncLogWrap").innerHTML = '<p class="hint">暂无 balance_log 记录，完成一次同步后将在此显示各户号余额写入记录。</p>';
        return;
      }
      $("syncLogWrap").innerHTML = groups.map(g => `
        <div class="log-user-group">
          <h3>${g.user_name || g.user_id} <span>${g.user_id} · 最近 ${(g.records || []).length} 条</span></h3>
          <table class="sync-table">
            <thead><tr><th>同步时间</th><th>余额(元)</th><th>应交(元)</th></tr></thead>
            <tbody>${(g.records || []).map(r =>
              `<tr><td>${r.sync_at || "—"}</td><td>${r.balance != null ? r.balance : "—"}</td><td>${r.amount_due != null ? r.amount_due : "—"}</td></tr>`
            ).join("")}</tbody>
          </table>
        </div>`).join("");
    }

    async function loadLogs() {
      const data = await api("/api/logs?per_user=5");
      renderBalanceLogs(data.balance_groups || []);
      $("logBox").textContent = (data.app_lines || []).join("\n") || "（暂无 app.log）";
      $("logBox").scrollTop = $("logBox").scrollHeight;
    }

    function scheduleLogPolling() {
      if (logTimer) clearInterval(logTimer);
      logTimer = null;
      if (activeTab === "logs") { loadLogs(); logTimer = setInterval(loadLogs, 5000); }
    }

    async function refreshAll() {
      await loadStatus();
      if (dbEnabled) await loadUsers();
      if (activeTab === "logs") await loadLogs();
      const uid = $("userSelect").value;
      if (uid && activeTab === "monitor" && dbEnabled) await loadUser(uid);
    }

    $("userSelect").addEventListener("change", () => loadUser($("userSelect").value));
    $("refreshBtn").addEventListener("click", async () => {
      const btn = $("refreshBtn");
      btn.classList.add("spinning");
      try { await refreshAll(); toast("数据已刷新", "success", 2000); }
      catch (e) { toast("刷新失败：" + e.message, "error"); }
      finally { btn.classList.remove("spinning"); }
    });
    $("logoutBtn").addEventListener("click", async () => {
      try { await api("/api/logout", { method: "POST" }); } catch (_) {}
      sessionStorage.removeItem("dashboard_session");
      sessionToken = "";
      showLogin(true);
    });
    $("loginBtn").addEventListener("click", doLogin);
    $("loginPassword").addEventListener("keydown", (e) => { if (e.key === "Enter") doLogin(); });
    $("fetchBtn").addEventListener("click", async () => {
      if (!(await confirmBox("确定立即同步？国网有登录频率限制，请勿频繁操作。", { okText: "立即同步", danger: true }))) return;
      try { await api("/api/fetch", { method: "POST" }); toast("已启动同步，请查看运行日志", "success"); switchTab("logs"); await refreshAll(); }
      catch (e) { toast(e.message, "error"); }
    });
    $("clearLogBtn").addEventListener("click", async () => {
      if (!(await confirmBox("确定清空日志文件？此操作不可恢复。", { okText: "清空", danger: true }))) return;
      try {
        await api("/api/logs/clear", { method: "POST" });
        toast("日志已清空", "success");
        await refreshAll();
      }
      catch (e) { toast(e.message, "error"); }
    });
    $("mqttRepublishBtn").addEventListener("click", async () => {
      try {
        await api("/api/mqtt/republish", { method: "POST" });
        toast("MQTT 数据已重新发布", "success");
      }
      catch (e) { toast(e.message, "error"); }
    });

    /* 快捷键：R 刷新，S 同步，1/2/3 切换 tab */
    document.addEventListener("keydown", (e) => {
      if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA" || e.target.tagName === "SELECT") return;
      if (e.ctrlKey || e.altKey || e.metaKey) return;
      const k = e.key.toLowerCase();
      if (k === "r") { e.preventDefault(); $("refreshBtn").click(); }
      else if (k === "s") { e.preventDefault(); $("fetchBtn").click(); }
      else if (k === "1") switchTab("monitor");
      else if (k === "2") switchTab("logs");
      else if (k === "3") switchTab("env");
    });

    function switchTab(name) {
      activeTab = name;
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.tab === name));
      $("panelMonitor").classList.toggle("active", name === "monitor");
      $("panelLogs").classList.toggle("active", name === "logs");
      $("panelEnv").classList.toggle("active", name === "env");
      $("userSelect").style.display = name === "monitor" ? "" : "none";
      $("fetchBtn").style.display = name === "monitor" ? "" : "none";
      const refreshTxt = $("refreshBtn").querySelector(".btn-text");
      if (refreshTxt) refreshTxt.textContent = name === "logs" ? "刷新日志" : "刷新数据";
      if (name === "env") loadEnv();
      scheduleLogPolling();
    }
    document.querySelectorAll(".tab-btn").forEach(b => b.addEventListener("click", () => switchTab(b.dataset.tab)));

    async function loadEnv() {
      try {
        const data = await api("/api/env");
        $("envMeta").textContent = data.exists ? `文件: ${data.path} · 更新: ${data.updated_at || "—"}` : `文件不存在: ${data.path}`;
        $("envEditor").value = data.content || "";
      } catch (e) { $("envMeta").textContent = "加载失败: " + e.message; }
    }
    $("envReloadBtn").addEventListener("click", async () => {
      try { const r = await api("/api/env/reload", { method: "POST" }); toast(r.message || "已重载", "success"); } catch (e) { toast(e.message, "error"); }
    });
    $("envSaveBtn").addEventListener("click", async () => {
      if (!(await confirmBox("确定保存 .env 并热重载配置？", { okText: "保存并应用" }))) return;
      try { const r = await api("/api/env", { method: "PUT", body: JSON.stringify({ content: $("envEditor").value }) }); toast(r.message || "已保存", "success"); await loadEnv(); await loadStatus(); }
      catch (e) { toast(e.message, "error"); }
    });

    async function bootstrap() {
      const cfg = await fetch("./api/config").then(r => r.json());
      loginRequired = !!cfg.login_required;
      dbEnabled = cfg.db_enabled !== false;
      if (loginRequired && !sessionToken) { showLogin(true); return; }
      showLogin(false);
      await refreshAll();
      if (statusTimer) clearInterval(statusTimer);
      statusTimer = setInterval(loadStatus, 8000);
    }

    bootstrap().catch(() => showLogin(loginRequired));
  </script>
</body>
</html>
